<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - Daily Price</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 500;
      color: #333;
    }

    .header p {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #666;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
        border-radius: 12px;
      }

      .header .logo {
        font-size: 40px;
      }

      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">💰</div>
      <h1>重置密码</h1>
      <p>Daily Price 资产管理应用</p>
    </div>

    <div id="loading" class="loading" style="display: flex; justify-content: center; padding: 40px;">
      <div class="spinner" style="border-color: #667eea; border-top-color: transparent;"></div>
      <span style="color: #666; margin-left: 8px;">正在验证链接...</span>
    </div>

    <div id="form-container" class="hidden">
      <div id="message" class="message"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">新密码</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="请输入新密码（至少6位）"
            required
            minlength="6"
          >
        </div>

        <div class="form-group">
          <label for="confirm-password">确认密码</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="请再次输入新密码"
            required
          >
        </div>

        <button type="submit" id="submit-btn" class="btn">
          重置密码
        </button>
      </form>

      <div class="footer">
        <p>重置成功后，请返回应用使用新密码登录</p>
      </div>
    </div>

    <div id="success-container" class="hidden">
      <div class="message success" style="display: block; text-align: center;">
        <p style="font-size: 16px; margin-bottom: 8px;">✅ 密码重置成功！</p>
        <p>请返回 Daily Price 应用使用新密码登录</p>
      </div>
    </div>

    <div id="error-container" class="hidden">
      <div class="message error" style="display: block; text-align: center;">
        <p id="error-message">链接无效或已过期，请重新发起密码重置</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://yfkzdoputwygnfqwtrck.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_btYCq4AdFM7jKC2l1ridDg_mQRE2ws5';

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loadingEl = document.getElementById('loading');
    const formContainerEl = document.getElementById('form-container');
    const successContainerEl = document.getElementById('success-container');
    const errorContainerEl = document.getElementById('error-container');
    const messageEl = document.getElementById('message');
    const resetForm = document.getElementById('reset-form');
    const submitBtn = document.getElementById('submit-btn');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');

    function showMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = `message ${isError ? 'error' : 'success'}`;
      messageEl.style.display = 'block';
    }

    function hideMessage() {
      messageEl.style.display = 'none';
    }

    async function init() {
      // 从 URL 中获取 code 参数
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');

      if (!code) {
        loadingEl.style.display = 'none';
        errorContainerEl.classList.remove('hidden');
        return;
      }

      try {
        // 使用 code 换取 session
        const { data, error } = await client.auth.exchangeCodeForSession(code);

        if (error) {
          throw error;
        }

        // 验证成功，显示表单
        loadingEl.style.display = 'none';
        formContainerEl.classList.remove('hidden');
      } catch (error) {
        console.error('Exchange code error:', error);
        loadingEl.style.display = 'none';
        errorContainerEl.classList.remove('hidden');
        document.getElementById('error-message').textContent =
          error.message || '链接无效或已过期，请重新发起密码重置';
      }
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // 验证密码
      if (password.length < 6) {
        showMessage('密码长度至少为6位', true);
        return;
      }

      if (password !== confirmPassword) {
        showMessage('两次输入的密码不一致', true);
        return;
      }

      // 禁用按钮，显示加载状态
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading"><div class="spinner"></div><span>正在重置...</span></div>';

      try {
        // 更新密码
        const { error } = await client.auth.updateUser({
          password: password
        });

        if (error) {
          throw error;
        }

        // 重置成功
        formContainerEl.classList.add('hidden');
        successContainerEl.classList.remove('hidden');
      } catch (error) {
        console.error('Update password error:', error);
        showMessage(error.message || '重置密码失败，请重试', true);
        submitBtn.disabled = false;
        submitBtn.textContent = '重置密码';
      }
    });

    // 页面加载时执行验证
    init();
  </script>
</body>
</html>
